---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: postgres-credentials
  namespace: microservices
spec:
  encryptedData:
    auth-db-name: 
    auth-db-password: 
    auth-db-user: 
    kafka-password: 
    kafka-user: 
    mongodb-root-password: 
    mongodb-root-username: 
    order-db-name: 
    order-db-password: 
    order-db-user: 
    postgres-password: 
    postgres-user: 
    user-db-name: 
    user-db-password: 
    user-db-user: 
  template:
    metadata:
      name: postgres-credentials
      namespace: microservices
    type: Opaque
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: app-secrets
  namespace: microservices
spec:
  encryptedData:
    admin-bootstrap-login: 
    admin-bootstrap-password: 
    gateway-internal-secret: 
    jwt-secret: 
  template:
    metadata:
      name: app-secrets
      namespace: microservices
    type: Opaque
