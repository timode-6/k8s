apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb
  namespace: microservices
  labels:
    app: mongodb
    tier: infrastructure
spec:
  serviceName: mongodb-headless
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
        tier: infrastructure
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: mongodb
          image: mongo:7.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: mongodb
              containerPort: 27017
          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              valueFrom:
                secretKeyRef: {name: postgres-credentials, key: mongodb-root-username}
            - name: MONGO_INITDB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef: {name: postgres-credentials, key: mongodb-root-password}

            - name: MONGO_INITDB_DATABASE
              value: payment_db
          volumeMounts:
            - name: mongo-data
              mountPath: /data/db
          resources:
            requests:
              cpu: 150m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          startupProbe:
            exec:
              command:
                - mongosh
                - -u
                - "$(MONGO_INITDB_ROOT_USERNAME)"
                - -p
                - "$(MONGO_INITDB_ROOT_PASSWORD)"
                - --quiet
                - --eval
                - "db.adminCommand('ping').ok"
            failureThreshold: 30
            periodSeconds: 5
          livenessProbe:
            exec:
              command:
                - mongosh
                - -u
                - "$(MONGO_INITDB_ROOT_USERNAME)"
                - -p
                - "$(MONGO_INITDB_ROOT_PASSWORD)"
                - --quiet
                - --eval
                - "db.adminCommand('ping').ok"
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - mongosh
                - -u
                - "$(MONGO_INITDB_ROOT_USERNAME)"
                - -p
                - "$(MONGO_INITDB_ROOT_PASSWORD)"
                - --quiet
                - --eval
                - "db.adminCommand('ping').ok"
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
  volumeClaimTemplates:
    - metadata:
        name: mongo-data
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 2Gi

---
apiVersion: v1
kind: Service
metadata:
  name: mongodb-headless
  namespace: microservices
  labels:
    app: mongodb
spec:
  clusterIP: None
  selector:
    app: mongodb
  ports:
    - port: 27017
      targetPort: 27017

---
apiVersion: v1
kind: Service
metadata:
  name: mongodb
  namespace: microservices
  labels:
    app: mongodb
    tier: infrastructure
spec:
  type: ClusterIP
  selector:
    app: mongodb
  ports:
    - name: mongodb
      port: 27017
      targetPort: 27017
