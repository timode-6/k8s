apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init-scripts
  namespace: microservices
data:
  01-init-databases.sh: |
    #!/bin/bash
    set -e

    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$POSTGRES_DB" <<-EOSQL
        CREATE DATABASE $AUTH_DB_NAME;
        CREATE USER $AUTH_DB_USER WITH PASSWORD '$AUTH_DB_PASSWORD';
        GRANT ALL PRIVILEGES ON DATABASE $AUTH_DB_NAME TO $AUTH_DB_USER;

        CREATE DATABASE $USER_DB_NAME;
        CREATE USER $USER_DB_USER WITH PASSWORD '$USER_DB_PASSWORD';
        GRANT ALL PRIVILEGES ON DATABASE $USER_DB_NAME TO $USER_DB_USER;

        CREATE DATABASE $ORDER_DB_NAME;
        CREATE USER $ORDER_DB_USER WITH PASSWORD '$ORDER_DB_PASSWORD';
        GRANT ALL PRIVILEGES ON DATABASE $ORDER_DB_NAME TO $ORDER_DB_USER;
    EOSQL

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: microservices
  labels:
    app: postgres
    tier: infrastructure
spec:
  serviceName: postgres-headless
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
        tier: infrastructure
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: postgres
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef: {name: postgres-credentials, key: postgres-user}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef: {name: postgres-credentials, key: postgres-password}
            - name: POSTGRES_DB
              value: "postgres" 
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata

            - name: AUTH_DB_NAME
              valueFrom:
                secretKeyRef: {name: postgres-credentials, key: auth-db-name}
            - name: AUTH_DB_USER
              valueFrom:
                secretKeyRef: {name: postgres-credentials, key: auth-db-user}
            - name: AUTH_DB_PASSWORD
              valueFrom:
                secretKeyRef: {name: postgres-credentials, key: auth-db-password}

            - name: USER_DB_NAME
              valueFrom:
                secretKeyRef: {name: postgres-credentials, key: user-db-name}
            - name: USER_DB_USER
              valueFrom:
                secretKeyRef: {name: postgres-credentials, key: user-db-user}
            - name: USER_DB_PASSWORD
              valueFrom:
                secretKeyRef: {name: postgres-credentials, key: user-db-password}

            - name: ORDER_DB_NAME
              valueFrom:
                secretKeyRef: {name: postgres-credentials, key: order-db-name}
            - name: ORDER_DB_USER
              valueFrom:
                secretKeyRef: {name: postgres-credentials, key: order-db-user}
            - name: ORDER_DB_PASSWORD
              valueFrom:
                secretKeyRef: {name: postgres-credentials, key: order-db-password}
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: init-scripts
              mountPath: /docker-entrypoint-initdb.d
              readOnly: true
          resources:
            requests:
              cpu: 150m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          startupProbe:
            exec:
              command: [pg_isready, -U, postgres]
            failureThreshold: 30
            periodSeconds: 5
          livenessProbe:
            exec:
              command: [pg_isready, -U, postgres]
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command: [pg_isready, -U, postgres]
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
      volumes:
        - name: init-scripts
          configMap:
            name: postgres-init-scripts
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 2Gi

---
apiVersion: v1
kind: Service
metadata:
  name: postgres-headless
  namespace: microservices
  labels:
    app: postgres
spec:
  clusterIP: None
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432

---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: microservices
  labels:
    app: postgres
    tier: infrastructure
spec:
  type: ClusterIP
  selector:
    app: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
