apiVersion: apps/v1
kind: Deployment
metadata:
  name: random-number-service
  namespace: microservices
  labels:
    app: random-number-service
    tier: app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: random-number-service
  template:
    metadata:
      labels:
        app: random-number-service
        tier: app
    spec:
      containers:
        - name: random-number-service
          image: random-number-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8085
          env:
            - name: PORT
              value: "8085"
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          startupProbe:
            httpGet:
              path: /health
              port: 8085
            failureThreshold: 10
            periodSeconds: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8085
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8085
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3

---
apiVersion: v1
kind: Service
metadata:
  name: random-number-service
  namespace: microservices
  labels:
    app: random-number-service
spec:
  type: ClusterIP
  selector:
    app: random-number-service
  ports:
    - name: http
      port: 80
      targetPort: 8085
