apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: microservices
  labels:
    app: gateway
    tier: app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
        tier: app
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: gateway
          image: gateway-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: SPRING_DATA_REDIS_HOST
              value: "redis"
            - name: SPRING_DATA_REDIS_PORT
              value: "6379"

            - name: JWT_SECRET
              valueFrom:
                secretKeyRef: { name: app-secrets, key: jwt-secret }
            - name: GATEWAY_INTERNAL_SECRET
              valueFrom:
                secretKeyRef: { name: app-secrets, key: gateway-internal-secret }
            
            - name: GATEWAY_PUBLIC_PATHS
              value: "/api/auth/registration,/api/auth/token,/api/auth/token/current,/api/auth/token/validation"

            - name: SPRING_CLOUD_GATEWAY_ROUTES_0_ID
              value: auth-service
            - name: SPRING_CLOUD_GATEWAY_ROUTES_0_URI
              value: "http://auth-service:8081"
            - name: SPRING_CLOUD_GATEWAY_ROUTES_0_PREDICATES_0
              value: "Path=/api/auth/**"

            - name: SPRING_CLOUD_GATEWAY_ROUTES_1_ID
              value: user-service
            - name: SPRING_CLOUD_GATEWAY_ROUTES_1_URI
              value: "http://user-service:8082"
            - name: SPRING_CLOUD_GATEWAY_ROUTES_1_PREDICATES_0
              value: "Path=/api/users/**,/api/card/**"

            - name: SPRING_CLOUD_GATEWAY_ROUTES_2_ID
              value: order-service
            - name: SPRING_CLOUD_GATEWAY_ROUTES_2_URI
              value: "http://order-service:8083"
            - name: SPRING_CLOUD_GATEWAY_ROUTES_2_PREDICATES_0
              value: "Path=/api/orders/**"

            - name: SPRING_CLOUD_GATEWAY_ROUTES_3_ID
              value: payment-service
            - name: SPRING_CLOUD_GATEWAY_ROUTES_3_URI
              value: "http://payment-service:8084"
            - name: SPRING_CLOUD_GATEWAY_ROUTES_3_PREDICATES_0
              value: "Path=/api/v1/payments/**"

            - name: AUTH_SERVICE_URL
              value: "http://auth-service:8081"
            - name: USER_SERVICE_URL
              value: "http://user-service:8082"
            - name: ORDER_SERVICE_URL
              value: "http://order-service:8083"

            - name: MANAGEMENT_HEALTH_PROBES_ENABLED
              value: "true"
            - name: MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE
              value: "health,info"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 300m
              memory: 512Mi
          startupProbe:
            tcpSocket: { port: 8080 }
            failureThreshold: 30
            periodSeconds: 10
          livenessProbe:
            tcpSocket: { port: 8080 }
            initialDelaySeconds: 60
          readinessProbe:
            tcpSocket: { port: 8080 }
            initialDelaySeconds: 30

---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: microservices
spec:
  type: ClusterIP 
  selector:
    app: gateway
  ports:
    - name: http
      port: 8080
      targetPort: 8080
